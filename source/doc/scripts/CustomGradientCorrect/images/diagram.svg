<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360"
     font-family="Helvetica, Arial, sans-serif" font-size="13">
   <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="6" markerHeight="6" orient="auto">
         <path d="M0,0 L10,5 L0,10 z" fill="#335"/>
      </marker>
      <style>
         .src  { fill:#cfe8d0; stroke:#2e7d32; stroke-width:1.5; rx:6; ry:6; }
         .clon { fill:#e6edf6; stroke:#335;    stroke-width:1.5; rx:6; ry:6; }
         .calb { fill:#fff4d6; stroke:#8a6d00; stroke-width:1.5; rx:6; ry:6; }
         .proc { fill:#dcecff; stroke:#1d4f8a; stroke-width:1.5; rx:6; ry:6; }
         .out  { fill:#fff; stroke:#666; stroke-width:1; rx:4; ry:4; }
         .hdr  { fill:#335; font-weight:bold; }
         .a    { stroke:#335; stroke-width:1.2; fill:none; marker-end:url(#arr); }
      </style>
   </defs>

   <text x="20" y="22" class="hdr">Multi Gradient Comparison data flow</text>

   <rect x="20" y="60" width="120" height="42" class="src"/>
   <text x="80" y="79" text-anchor="middle">Source view</text>
   <text x="80" y="95" text-anchor="middle" font-size="11">(never modified)</text>

   <rect x="180" y="60" width="120" height="42" class="clon"/>
   <text x="240" y="86" text-anchor="middle">Clone 1: SPFC</text>

   <rect x="340" y="60" width="140" height="42" class="calb"/>
   <text x="410" y="79" text-anchor="middle">Calibrated image</text>
   <text x="410" y="95" text-anchor="middle" font-size="11">(SPFC complete)</text>

   <!-- three branches -->
   <rect x="520" y="30" width="100" height="32" class="proc"/>
   <text x="570" y="51" text-anchor="middle">GC</text>
   <rect x="640" y="20" width="100" height="22" class="out"/>
   <text x="690" y="35" text-anchor="middle" font-size="11">id_GC</text>
   <rect x="640" y="46" width="100" height="22" class="out"/>
   <text x="690" y="61" text-anchor="middle" font-size="11">id_GC_bg</text>

   <rect x="520" y="80" width="100" height="32" class="proc"/>
   <text x="570" y="101" text-anchor="middle">MGC</text>
   <rect x="640" y="76" width="100" height="22" class="out"/>
   <text x="690" y="91" text-anchor="middle" font-size="11">id_MGC</text>
   <rect x="640" y="102" width="100" height="22" class="out"/>
   <text x="690" y="117" text-anchor="middle" font-size="11">id_MGC_bg</text>

   <rect x="520" y="130" width="100" height="32" class="proc"/>
   <text x="570" y="151" text-anchor="middle">ABE</text>
   <rect x="640" y="126" width="100" height="22" class="out"/>
   <text x="690" y="141" text-anchor="middle" font-size="11">id_ABE</text>
   <rect x="640" y="152" width="100" height="22" class="out"/>
   <text x="690" y="167" text-anchor="middle" font-size="11">id_ABE_bg</text>

   <!-- arrows -->
   <path class="a" d="M140,81 L180,81"/>
   <path class="a" d="M300,81 L340,81"/>
   <path class="a" d="M480,81 L520,46"/>
   <path class="a" d="M480,81 L520,96"/>
   <path class="a" d="M480,81 L520,146"/>
   <path class="a" d="M620,46 L640,30"/>
   <path class="a" d="M620,46 L640,55"/>
   <path class="a" d="M620,96 L640,85"/>
   <path class="a" d="M620,96 L640,110"/>
   <path class="a" d="M620,146 L640,135"/>
   <path class="a" d="M620,146 L640,160"/>

   <text x="20" y="220" font-size="11" fill="#666">
      SPFC uses the chosen telescope setup's sensor QE curve and filter
      parameters. Mono images run SPFC in single-channel mode using
      FITS FILTER. Six outputs total — none saved to disk.
   </text>
</svg>
