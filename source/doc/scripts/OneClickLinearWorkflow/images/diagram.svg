<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360"
     font-family="Helvetica, Arial, sans-serif" font-size="13">
   <defs>
      <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="6" markerHeight="6" orient="auto">
         <path d="M0,0 L10,5 L0,10 z" fill="#335"/>
      </marker>
      <style>
         .box { fill:#e6edf6; stroke:#335; stroke-width:1.5; rx:6; ry:6; }
         .nb  { fill:#fff4d6; stroke:#8a6d00; }
         .bb  { fill:#dcecff; stroke:#1d4f8a; }
         .opt { fill:#eee; stroke:#777; stroke-dasharray:4 3; }
         .lbl { fill:#222; }
         .hdr { fill:#335; font-weight:bold; }
         .arr { stroke:#335; stroke-width:1.5; fill:none;
                marker-end:url(#arrow); }
      </style>
   </defs>

   <text x="20" y="22" class="hdr">One-Click Linear Workflow</text>

   <!-- input -->
   <rect x="20" y="50" width="120" height="42" class="box"/>
   <text x="80" y="76" text-anchor="middle">Linear master</text>

   <!-- Step 1 gradient -->
   <rect x="170" y="50" width="160" height="42" class="box"/>
   <text x="250" y="69" text-anchor="middle">Gradient</text>
   <text x="250" y="85" text-anchor="middle" font-size="11">GC / ABE</text>

   <!-- NB path -->
   <rect x="360" y="20" width="120" height="42" class="nb"/>
   <text x="420" y="46" text-anchor="middle">NB preset</text>

   <!-- BB path -->
   <rect x="360" y="80" width="120" height="42" class="bb"/>
   <text x="420" y="106" text-anchor="middle">BB preset</text>

   <!-- BB substeps -->
   <rect x="510" y="80" width="100" height="32" class="bb"/>
   <text x="560" y="100" text-anchor="middle" font-size="12">Plate solve</text>

   <rect x="630" y="80" width="100" height="32" class="bb"/>
   <text x="680" y="100" text-anchor="middle" font-size="12">SPCC</text>

   <!-- After: BXT / NXT -->
   <rect x="170" y="160" width="160" height="42" class="box"/>
   <text x="250" y="179" text-anchor="middle">BlurXTerminator</text>
   <text x="250" y="195" text-anchor="middle" font-size="11">non-stellar 0.75-0.85</text>

   <rect x="360" y="160" width="160" height="42" class="box"/>
   <text x="440" y="179" text-anchor="middle">NoiseXTerminator</text>
   <text x="440" y="195" text-anchor="middle" font-size="11">detail 0.15  denoise 0.85</text>

   <!-- Optional star split -->
   <rect x="550" y="160" width="180" height="42" class="opt"/>
   <text x="640" y="179" text-anchor="middle">StarXTerminator</text>
   <text x="640" y="195" text-anchor="middle" font-size="11">stars + starless (optional)</text>

   <!-- Output siblings -->
   <rect x="360" y="250" width="160" height="42" class="opt"/>
   <text x="440" y="269" text-anchor="middle">Stars image</text>
   <text x="440" y="285" text-anchor="middle" font-size="11">&lt;view&gt;_stars</text>

   <rect x="540" y="250" width="190" height="42" class="opt"/>
   <text x="635" y="269" text-anchor="middle">Starless image</text>
   <text x="635" y="285" text-anchor="middle" font-size="11">&lt;view&gt; (in place)</text>

   <!-- arrows -->
   <path class="arr" d="M140,71 L170,71"/>
   <path class="arr" d="M330,65 L360,45"/>
   <path class="arr" d="M330,77 L360,97"/>
   <path class="arr" d="M480,97 L510,97"/>
   <path class="arr" d="M610,97 L630,97"/>
   <path class="arr" d="M420,62 L420,140 L250,140 L250,158"/>
   <path class="arr" d="M680,115 L680,140 L250,140 L250,158" stroke-dasharray="4 3"/>
   <path class="arr" d="M330,181 L360,181"/>
   <path class="arr" d="M520,181 L550,181"/>
   <path class="arr" d="M640,202 L640,230 L440,230 L440,250" stroke-dasharray="4 3"/>
   <path class="arr" d="M640,202 L640,230 L635,230 L635,250" stroke-dasharray="4 3"/>

   <text x="20" y="335" font-size="11" fill="#666">
      Dashed = optional path. Yellow = narrowband. Blue = broadband
      galaxy.
   </text>
</svg>
