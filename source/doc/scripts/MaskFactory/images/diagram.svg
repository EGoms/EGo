<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 380"
     font-family="Helvetica, Arial, sans-serif" font-size="13">
   <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="6" markerHeight="6" orient="auto">
         <path d="M0,0 L10,5 L0,10 z" fill="#335"/>
      </marker>
      <style>
         .src { fill:#cfe8d0; stroke:#2e7d32; stroke-width:1.5; rx:6; ry:6; }
         .lum { fill:#fff4d6; stroke:#8a6d00; stroke-width:1.5; rx:6; ry:6; }
         .rng { fill:#dcecff; stroke:#1d4f8a; stroke-width:1.5; rx:6; ry:6; }
         .str { fill:#f3d6ff; stroke:#5e2b86; stroke-width:1.5; rx:6; ry:6; }
         .hp  { fill:#ffe2cf; stroke:#a14f12; stroke-width:1.5; rx:6; ry:6; }
         .hdr { fill:#335; font-weight:bold; }
         .a   { stroke:#335; stroke-width:1.2; fill:none; marker-end:url(#arr); }
      </style>
   </defs>

   <text x="20" y="22" class="hdr">Mask Factory output catalog</text>

   <rect x="20" y="160" width="120" height="46" class="src"/>
   <text x="80" y="184" text-anchor="middle">Source view</text>
   <text x="80" y="198" text-anchor="middle" font-size="11">(any view)</text>

   <!-- Luminance branch -->
   <rect x="200" y="50" width="170" height="32" class="lum"/>
   <text x="285" y="71" text-anchor="middle">Luminance</text>
   <rect x="200" y="90" width="170" height="32" class="lum"/>
   <text x="285" y="111" text-anchor="middle">Luminance (inv)</text>
   <rect x="200" y="130" width="170" height="32" class="lum"/>
   <text x="285" y="151" text-anchor="middle">Stretched luminance</text>

   <!-- Range branch -->
   <rect x="200" y="180" width="170" height="32" class="rng"/>
   <text x="285" y="201" text-anchor="middle">Highlights mask</text>
   <rect x="200" y="220" width="170" height="32" class="rng"/>
   <text x="285" y="241" text-anchor="middle">Shadows mask</text>

   <!-- Star branch -->
   <rect x="200" y="270" width="170" height="32" class="str"/>
   <text x="285" y="291" text-anchor="middle">Star mask</text>
   <rect x="200" y="310" width="170" height="32" class="str"/>
   <text x="285" y="331" text-anchor="middle">Inverted star mask</text>

   <!-- nebula and highpass -->
   <rect x="430" y="270" width="170" height="32" class="str"/>
   <text x="515" y="291" text-anchor="middle">Nebula-only mask</text>
   <rect x="430" y="310" width="170" height="32" class="hp"/>
   <text x="515" y="331" text-anchor="middle">High-pass</text>

   <!-- arrows from src -->
   <path class="a" d="M140,178 L200,68"/>
   <path class="a" d="M140,180 L200,108"/>
   <path class="a" d="M140,183 L200,148"/>
   <path class="a" d="M140,188 L200,198"/>
   <path class="a" d="M140,193 L200,238"/>
   <path class="a" d="M140,196 L200,288"/>
   <path class="a" d="M140,199 L200,328"/>
   <path class="a" d="M140,196 L430,288"/>
   <path class="a" d="M140,199 L430,328"/>

   <text x="20" y="365" font-size="11" fill="#666">
      Yellow: luminance.  Blue: range (RangeSelection).
      Purple: starless-derived.  Orange: high-pass.
   </text>
</svg>
