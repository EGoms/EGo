<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340"
     font-family="Helvetica, Arial, sans-serif" font-size="13">
   <defs>
      <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5"
              markerWidth="6" markerHeight="6" orient="auto">
         <path d="M0,0 L10,5 L0,10 z" fill="#335"/>
      </marker>
      <style>
         .src { fill:#cfe8d0; stroke:#2e7d32; stroke-width:1.5; rx:6; ry:6; }
         .cs  { fill:#e6edf6; stroke:#335;    stroke-width:1.5; rx:6; ry:6; }
         .out { fill:#fff;    stroke:#666;    stroke-width:1;   rx:4; ry:4; }
         .sht { fill:#ffe2cf; stroke:#a14f12; stroke-width:1.5; rx:6; ry:6; }
         .hdr { fill:#335; font-weight:bold; }
         .a   { stroke:#335; stroke-width:1.2; fill:none; marker-end:url(#arr); }
      </style>
   </defs>

   <text x="20" y="22" class="hdr">Channel Preview: one source &rarr; many decompositions</text>

   <rect x="20" y="150" width="120" height="46" class="src"/>
   <text x="80" y="174" text-anchor="middle">Color source</text>
   <text x="80" y="188" text-anchor="middle" font-size="11">(active view)</text>

   <!-- Color-space boxes -->
   <g>
      <rect x="200"  y="50"  width="90" height="32" class="cs"/>
      <text x="245"  y="71"  text-anchor="middle">RGB</text>
      <rect x="200"  y="92"  width="90" height="32" class="cs"/>
      <text x="245"  y="113" text-anchor="middle">L*a*b*</text>
      <rect x="200"  y="134" width="90" height="32" class="cs"/>
      <text x="245"  y="155" text-anchor="middle">L*c*h*</text>
      <rect x="200"  y="176" width="90" height="32" class="cs"/>
      <text x="245"  y="197" text-anchor="middle">HSV</text>
      <rect x="200"  y="218" width="90" height="32" class="cs"/>
      <text x="245"  y="239" text-anchor="middle">HSI</text>
      <rect x="200"  y="260" width="90" height="32" class="cs"/>
      <text x="245"  y="281" text-anchor="middle">XYZ</text>
   </g>

   <!-- Output channels for each space -->
   <g font-size="11">
      <rect x="320" y="50"  width="40" height="32" class="out"/><text x="340" y="71"  text-anchor="middle">R</text>
      <rect x="365" y="50"  width="40" height="32" class="out"/><text x="385" y="71"  text-anchor="middle">G</text>
      <rect x="410" y="50"  width="40" height="32" class="out"/><text x="430" y="71"  text-anchor="middle">B</text>

      <rect x="320" y="92"  width="40" height="32" class="out"/><text x="340" y="113" text-anchor="middle">L</text>
      <rect x="365" y="92"  width="40" height="32" class="out"/><text x="385" y="113" text-anchor="middle">a</text>
      <rect x="410" y="92"  width="40" height="32" class="out"/><text x="430" y="113" text-anchor="middle">b</text>

      <rect x="320" y="134" width="40" height="32" class="out"/><text x="340" y="155" text-anchor="middle">L</text>
      <rect x="365" y="134" width="40" height="32" class="out"/><text x="385" y="155" text-anchor="middle">c</text>
      <rect x="410" y="134" width="40" height="32" class="out"/><text x="430" y="155" text-anchor="middle">h</text>

      <rect x="320" y="176" width="40" height="32" class="out"/><text x="340" y="197" text-anchor="middle">H</text>
      <rect x="365" y="176" width="40" height="32" class="out"/><text x="385" y="197" text-anchor="middle">S</text>
      <rect x="410" y="176" width="40" height="32" class="out"/><text x="430" y="197" text-anchor="middle">V</text>

      <rect x="320" y="218" width="40" height="32" class="out"/><text x="340" y="239" text-anchor="middle">H</text>
      <rect x="365" y="218" width="40" height="32" class="out"/><text x="385" y="239" text-anchor="middle">S</text>
      <rect x="410" y="218" width="40" height="32" class="out"/><text x="430" y="239" text-anchor="middle">I</text>

      <rect x="320" y="260" width="40" height="32" class="out"/><text x="340" y="281" text-anchor="middle">X</text>
      <rect x="365" y="260" width="40" height="32" class="out"/><text x="385" y="281" text-anchor="middle">Y</text>
      <rect x="410" y="260" width="40" height="32" class="out"/><text x="430" y="281" text-anchor="middle">Z</text>
   </g>

   <!-- contact sheet -->
   <rect x="540" y="140" width="180" height="60" class="sht"/>
   <text x="630" y="166" text-anchor="middle">Contact sheet</text>
   <text x="630" y="186" text-anchor="middle" font-size="11">tiled 8-bit RGB</text>

   <!-- arrows from source to color spaces -->
   <path class="a" d="M140,170 L200,68"/>
   <path class="a" d="M140,172 L200,110"/>
   <path class="a" d="M140,173 L200,152"/>
   <path class="a" d="M140,175 L200,194"/>
   <path class="a" d="M140,178 L200,236"/>
   <path class="a" d="M140,181 L200,278"/>

   <!-- arrows from outputs to contact sheet -->
   <path class="a" d="M450,168 L540,168" stroke-dasharray="3 3"/>

   <text x="20" y="320" font-size="11" fill="#666">
      Dashed arrow: aggregated tiles. Inverted variants (optional) are
      duplicated and complemented.
   </text>
</svg>
